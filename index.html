<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Погодное приложение | Weather App</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts для красивого шрифта -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 (иконки) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-cloud-sun"></i> Погодный гид</h1>
            <div class="search-box">
                <input type="text" id="cityInput" placeholder="Введите город..." autocomplete="off">
                <button id="searchBtn"><i class="fas fa-search"></i></button>
                <button id="locationBtn" title="Моя геолокация"><i class="fas fa-location-dot"></i></button>
            </div>
        </header>

        <!-- Основной блок с текущей погодой -->
        <main>
            <div class="current-weather">
                <div class="city-info">
                    <h2 id="cityName">Москва</h2>
                    <p id="dateTime">--</p>
                </div>
                <div class="weather-main">
                    <div class="weather-icon">
                        <img id="weatherIcon" src="" alt="иконка погоды">
                    </div>
                    <div class="temperature">
                        <span id="temp">--</span>°C
                    </div>
                    <div class="description">
                        <span id="weatherDesc">--</span>
                    </div>
                </div>
                <div class="details">
                    <div class="detail-item">
                        <i class="fas fa-temperature-low"></i>
                        <span>Ощущается: <span id="feelsLike">--</span>°C</span>
                    </div>
                    <div class="detail-item">
                        <i class="fas fa-tint"></i>
                        <span>Влажность: <span id="humidity">--</span>%</span>
                    </div>
                    <div class="detail-item">
                        <i class="fas fa-wind"></i>
                        <span>Ветер: <span id="wind">--</span> м/с</span>
                    </div>
                    <div class="detail-item">
                        <i class="fas fa-compress-alt"></i>
                        <span>Давление: <span id="pressure">--</span> мм рт. ст.</span>
                    </div>
                </div>
            </div>

            <!-- Прогноз на 5 дней -->
            <div class="forecast">
                <h3><i class="fas fa-calendar-week"></i> Прогноз на 5 дней</h3>
                <div class="forecast-cards" id="forecastContainer">
                    <!-- Карточки прогноза будут добавляться JS -->
                </div>
            </div>
        </main>

        <footer>
            <p>Данные предоставлены <a href="https://openweathermap.org/" target="_blank">OpenWeatherMap</a></p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
